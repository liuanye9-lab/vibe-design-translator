name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

  macos-app:
    name: Build native macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify macOS project structure
        working-directory: macos/VibeDesignTranslator
        run: ./script/verify_project.sh

      - name: Build VibeDesignTranslator
        working-directory: macos/VibeDesignTranslator
        run: |
          xcodebuild \
            -project VibeDesignTranslator.xcodeproj \
            -scheme VibeDesignTranslator \
            -configuration Debug \
            -derivedDataPath dist/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Inspect app bundle
        working-directory: macos/VibeDesignTranslator
        run: |
          APP="dist/DerivedData/Build/Products/Debug/VibeDesignTranslator.app"
          test -d "$APP"
          test -x "$APP/Contents/MacOS/VibeDesignTranslator"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$APP/Contents/Info.plist"
          /usr/bin/file "$APP/Contents/MacOS/VibeDesignTranslator"

      - name: Launch app smoke test
        working-directory: macos/VibeDesignTranslator
        run: |
          APP="dist/DerivedData/Build/Products/Debug/VibeDesignTranslator.app"
          pkill -x VibeDesignTranslator || true
          open -n "$APP"
          for attempt in 1 2 3 4 5; do
            if pgrep -x VibeDesignTranslator >/dev/null; then
              pkill -x VibeDesignTranslator || true
              exit 0
            fi
            sleep 2
          done
          echo "VibeDesignTranslator did not start" >&2
          exit 1

      - name: Package app artifact
        working-directory: macos/VibeDesignTranslator
        run: |
          mkdir -p dist/artifacts
          ditto -c -k --keepParent \
            dist/DerivedData/Build/Products/Debug/VibeDesignTranslator.app \
            dist/artifacts/VibeDesignTranslator-Debug.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeDesignTranslator-Debug
          path: macos/VibeDesignTranslator/dist/artifacts/VibeDesignTranslator-Debug.app.zip
          if-no-files-found: error
