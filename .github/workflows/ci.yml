name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

  macos-app:
    name: Build native macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify macOS project structure
        working-directory: macos/VibeDesignTranslator
        run: ./script/verify_project.sh

      - name: Build VibeDesignTranslator
        working-directory: macos/VibeDesignTranslator
        run: |
          xcodebuild \
            -project VibeDesignTranslator.xcodeproj \
            -scheme VibeDesignTranslator \
            -configuration Debug \
            -derivedDataPath dist/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
